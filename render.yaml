services:
  - type: web
    name: retearn-website
    runtime: node
    plan: free
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SITE_URL
        value: https://retearn.pl
    routes:
      - path: /
        destination: /
    staticPublicPath: .next/static
    autoDeploy: true
